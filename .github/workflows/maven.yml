# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# Este workflow é iniciado por push ou um pull_request no repositorio

name: Java CI with Maven # nome que descreve o fluxo de trabalho

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
# no Github algumas tarefas exigem permissões
permissions:
  contents: write # permite que um usuario adicione um comentário a uma issue
  id-token: write
# Jobs executa uma ou mais tarefas de acordo com a ação push ou pull_request
jobs:
  build:
    # tipos de executores - são servidores que executam fluxos de trabalho
    runs-on: ubuntu-latest
    #Os jobs contem uma sequencia de tarefas chamadas steps
    steps:
    - uses: actions/checkout@v4 # permite executar unidade de código reutilizáveis ou outros pacotes
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build and Verify Coverage with Maven
      run: mvn -B verify --file pom.xml

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    # - name: Update dependency graph
    #  uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
